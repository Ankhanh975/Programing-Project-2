<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Alpha win rate by strategy variant">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 14px; fill: #334155; }
    .tiny { font-size: 10px; fill: #334155; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="34" class="title">Alpha win rate by strategy variant</text>
  
    
      <text x="292" y="107" text-anchor="end" class="label">Standard MCTS</text>
      <rect x="310" y="80" width="560" height="42" rx="4" fill="#e2e8f0"/>
      <rect x="310" y="80" width="350" height="42" rx="4" fill="#2563eb"/>
      <text x="670" y="107" class="small">63%</text>
    
      <text x="292" y="173" text-anchor="end" class="label">Hybrid MCTS + heuristic evaluation</text>
      <rect x="310" y="146" width="560" height="42" rx="4" fill="#e2e8f0"/>
      <rect x="310" y="146" width="140" height="42" rx="4" fill="#2563eb"/>
      <text x="460" y="173" class="small">25%</text>
    
      <text x="292" y="239" text-anchor="end" class="label">Risk-aware MCTS</text>
      <rect x="310" y="212" width="560" height="42" rx="4" fill="#e2e8f0"/>
      <rect x="310" y="212" width="210" height="42" rx="4" fill="#2563eb"/>
      <text x="530" y="239" class="small">38%</text>
    
      <text x="292" y="305" text-anchor="end" class="label">High-exploration MCTS</text>
      <rect x="310" y="278" width="560" height="42" rx="4" fill="#e2e8f0"/>
      <rect x="310" y="278" width="350" height="42" rx="4" fill="#2563eb"/>
      <text x="670" y="305" class="small">63%</text>
    
      <text x="292" y="371" text-anchor="end" class="label">Higher-budget MCTS</text>
      <rect x="310" y="344" width="560" height="42" rx="4" fill="#e2e8f0"/>
      <rect x="310" y="344" width="280" height="42" rx="4" fill="#2563eb"/>
      <text x="600" y="371" class="small">50%</text>
    
    <text x="310" y="522" class="small">0%</text>
    <text x="590" y="522" text-anchor="middle" class="small">50%</text>
    <text x="870" y="522" text-anchor="end" class="small">100%</text>
  
</svg>
