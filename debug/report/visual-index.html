<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Minecraft PvP MCTS Report Visuals</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: #0f172a; background: #f8fafc; }
    main { max-width: 1080px; margin: 0 auto; padding: 32px; }
    h1 { font-size: 28px; margin: 0 0 24px; }
    section { margin: 0 0 28px; padding: 18px; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    img { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <main>
    <h1>Minecraft PvP MCTS Report Visuals</h1>
    <section><h2>Win rate by variant</h2><img src="win-rate-by-variant.svg" alt="Win rate by variant"></section>
    <section><h2>Action distribution by variant</h2><img src="action-distribution-by-variant.svg" alt="Action distribution by variant"></section>
    <section><h2>Health over time</h2><img src="health-over-time.svg" alt="Health over time"></section>
    <section><h2>Distance over time</h2><img src="distance-over-time.svg" alt="Distance over time"></section>
    <section><h2>Action distribution</h2><img src="action-distribution.svg" alt="Action distribution"></section>
    <section><h2>Outcome summary</h2><img src="outcome-summary.svg" alt="Outcome summary"></section>
    <section><h2>Arena path</h2><img src="arena-path.svg" alt="Arena path"></section>
  </main>
</body>
</html>
